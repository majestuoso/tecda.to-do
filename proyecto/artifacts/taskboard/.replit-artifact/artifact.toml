kind = "web"
previewPath = "/"
title = "TaskBoard"
version = "1.0.0"
id = "artifacts/taskboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25222

[services.development]
run = "pnpm --filter @workspace/taskboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taskboard", "run", "build" ]
publicDir = "artifacts/taskboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25222"
BASE_PATH = "/"
